modalities:
- rgb
- eye_gaze
- face_mesh
- depth
frames:
  default: 32
image_size: 224
face_crop:
  enabled: true
  backend: opencv_haar
  detection_frequency: 16
  large_box_coef: 1.5
  fallback: full_frame
dim: 256
seed: 0
device: cuda
fusion:
  type: token_transformer
  num_layers: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.05
  max_time_steps: 64
  checkpoint_path: null
head:
  type: modality_gated_mil
  hidden_dim: 1024
  dropout: 0.15
eye_gaze:
  model_path: models/face_landmarker_v2_with_blendshapes.task
  slot_count: 8
rgb:
  frames: 16
  checkpoint_path: checkpoints/mvit_v2_s-ae3be167.pth
  slot_count: 8
face_mesh:
  slot_count: 24
depth:
  model_id_or_path: models/depth-anything-v2-small-hf
  feature_dim: 384
  slot_count: 4
